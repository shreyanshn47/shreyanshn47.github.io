# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
local: "en-US"
title: "Shreyansh M"
# subtitle: "Cybersecurity Researcher"
name: "Shreyansh M"
description: >- # this means to ignore newlines until "baseurl:"
  Cybersecurity graduate specializing in threat intelligence, 
  malware analysis, and public policy.
url: "https://shreyanshn47.github.io"
baseurl: ""
repository: "shreyanshn47/shreyanshn47.github.io"

github_username: shreyanshn47
search: true

# Build settings
livereload: true
markdown: kramdown
remote_theme: "mmistakes/minimal-mistakes@4.28.0"
minimal_mistakes_skin: "dark"   # default, air, aqua, contrast, dark, mint

# Outputting
# permalink: /:categories/:title/
# paginate: 5 # amount of posts to show
# paginate_path: /page:num/
# timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "Shreyansh M"
  avatar : "/assets/images/bio-photo.jpg"
  bio    : "Cybersecurity researcher and collaborative problem solver"
  location: "San Francisco, CA"
  links:
    # - label: "Website"
    #   icon: "fas fa-fw fa-link"
    #   url: "https://shreyanshn47.github.io"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/shreyansh-narayan/"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:shreyanshn47@email.com"

footer:
  links:
    # - label: "Website"
    #   icon: "fas fa-fw fa-link"
    #   url: "https://shreyanshn47.github.io"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/shreyansh-narayan/"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:shreyanshn47@email.com"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      # comments: true
      share: true
      # related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

head_scripts:
  - /assets/js/smooth-scroll.js